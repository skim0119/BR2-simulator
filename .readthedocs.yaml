version: 2

build:
  os: "ubuntu-22.04"
  tools:
    python: "3.10" 
  jobs:
    post_create_environment:
      # Install uv
      - pip install uv

    post_install:
      # Install dependencies with 'docs' optional dependency group
      - uv pip install -e ".[docs]"

sphinx:
  configuration: docs/conf.py
